<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pre-order — inoa</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- Open Graph -->
  <meta property="og:title" content="pre-order — inoa">
  <meta property="og:description" content="Place a pre-order for fresh poke and sushi from inoa in Scotts Valley, CA.">
  <meta property="og:image" content="https://inoa.kitchen/og-image.png">
  <meta property="og:url" content="https://inoa.kitchen/order">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://inoa.kitchen/og-image.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:       #1a1a1a;
      --cream:     #f5f0e8;
      --sand:      #e8e0d0;
      --driftwood: #8b7355;
      --ogo:       #4a7c6f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Grain */
    .grain {
      position: fixed; inset: -50%; width: 200%; height: 200%;
      opacity: 0.025; pointer-events: none; z-index: 9999;
    }

    /* Page intro */
    .page-intro {
      position: fixed; inset: 0; background: var(--ink);
      z-index: 500; pointer-events: none;
      animation: curtain-lift 1.1s cubic-bezier(0.76,0,0.24,1) 0.1s both;
    }
    @keyframes curtain-lift {
      0%   { clip-path: inset(0 0 0% 0); }
      100% { clip-path: inset(0 0 100% 0); }
    }

    /* Nav */
    .order-nav {
      position: fixed; inset: 0 0 auto 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 64px;
      background: rgba(245,240,232,0.92);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 1px 0 rgba(26,26,26,0.07);
      animation: nav-in 0.6s ease 0.4s both;
    }
    @keyframes nav-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .order-nav-logo {
      height: 26px; width: auto; display: block;
      text-decoration: none;
    }
    .order-nav-back {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--ink); opacity: 0.45;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }
    .order-nav-back:hover { opacity: 0.9; }

    .legal-footer { background: var(--ink); border-top: 1px solid rgba(245,240,232,0.05); padding: 18px 80px; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .legal-footer-links { display: flex; gap: 28px; flex-wrap: wrap; }
    .legal-footer-links a { font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cream); text-decoration: none; opacity: 0.28; transition: opacity 0.2s ease; }
    .legal-footer-links a:hover { opacity: 0.6; }
    .legal-footer-copy { font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 0.08em; color: var(--cream); opacity: 0.16; white-space: nowrap; }
    @media (max-width: 640px) { .legal-footer { padding: 18px 24px; justify-content: center; text-align: center; } .legal-footer-links { justify-content: center; gap: 18px; } }

    /* Page wrapper */
    .order-page {
      min-height: 100vh;
      padding: 120px 80px 96px;
    }
    .preorder-inner { max-width: 1040px; margin: 0 auto; }

    /* Heading */
    .preorder-heading {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(42px, 5vw, 72px);
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .preorder-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--ink); opacity: 0.42;
      letter-spacing: 0.06em; margin-bottom: 52px;
    }

    /* Step indicator */
    .po-steps { display: flex; align-items: center; margin-bottom: 48px; max-width: 440px; }
    .po-step-node { display: flex; flex-direction: column; align-items: center; gap: 7px; flex-shrink: 0; }
    .po-step-circle {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1.5px solid rgba(26,26,26,0.18);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif; font-size: 11px;
      color: var(--ink); opacity: 0.32; transition: all 0.3s ease; background: transparent;
    }
    .po-step-node.active .po-step-circle { background: var(--ink); border-color: var(--ink); color: var(--cream); opacity: 1; }
    .po-step-node.done  .po-step-circle  { background: var(--driftwood); border-color: var(--driftwood); color: var(--cream); opacity: 1; }
    .po-step-label {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--ink); opacity: 0.32; white-space: nowrap;
    }
    .po-step-node.active .po-step-label,
    .po-step-node.done  .po-step-label { opacity: 0.7; }
    .po-step-line { flex: 1; height: 1px; background: rgba(26,26,26,0.1); margin-bottom: 22px; margin-left: 4px; margin-right: 4px; }
    .po-step-line.done { background: var(--driftwood); opacity: 0.4; }

    /* Step animation */
    @keyframes po-in { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .po-step-content { animation: po-in 0.42s cubic-bezier(0.25,0.46,0.45,0.94) both; }

    /* Step 1 — order layout */
    .po-order-layout { display: grid; grid-template-columns: 1fr 272px; gap: 40px; align-items: start; }
    .po-items-col { min-width: 0; }

    /* Group section header */
    .po-group-hdr {
      margin-top: 36px;
      margin-bottom: 14px;
      padding-bottom: 11px;
      border-bottom: 1px solid rgba(26,26,26,0.07);
    }
    .po-group-label {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--driftwood); opacity: 0.75;
      margin-bottom: 5px;
    }
    .po-group-desc {
      font-family: 'DM Sans', sans-serif; font-size: 11px;
      color: var(--ink); opacity: 0.36;
      line-height: 1.65; font-style: italic;
    }

    /* Item cards */
    .po-item-card {
      display: flex; align-items: center;
      padding: 13px 18px; background: #fff;
      border: 1px solid rgba(26,26,26,0.07); border-radius: 3px;
      margin-bottom: 7px; transition: border-color 0.2s ease, box-shadow 0.2s ease; gap: 16px;
    }
    .po-item-card:hover { border-color: rgba(26,26,26,0.16); }
    .po-item-card.selected { border-color: var(--driftwood); background: rgba(139,115,85,0.025); }
    .po-item-info { flex: 1; min-width: 0; }
    .po-item-name { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); margin-bottom: 2px; }
    .po-item-meta { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink); opacity: 0.38; line-height: 1.55; }
    .po-item-price { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); opacity: 0.52; flex-shrink: 0; width: 48px; text-align: right; }
    .po-qty { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .po-qty-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(26,26,26,0.18); background: transparent;
      cursor: pointer; font-size: 17px; line-height: 1; color: var(--ink);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease; font-family: 'DM Sans', sans-serif;
    }
    .po-qty-btn:hover:not(:disabled) { background: var(--ink); border-color: var(--ink); color: var(--cream); }
    .po-qty-btn:active:not(:disabled) { transform: scale(0.92); }
    .po-qty-btn:disabled { opacity: 0.2; cursor: default; }
    .po-qty-val { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); min-width: 14px; text-align: center; }

    /* Flavor / poke choice pickers */
    .po-flavor-picker {
      margin-bottom: 14px;
      padding: 12px 18px 14px;
      background: rgba(26,26,26,0.018);
      border: 1px solid rgba(26,26,26,0.08);
      border-top: none;
      border-radius: 0 0 3px 3px;
    }
    .po-flavor-hdr {
      font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink); opacity: 0.42; margin-bottom: 10px;
    }
    .po-flavor-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .po-flavor-chip {
      padding: 5px 12px; border-radius: 2px;
      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 400;
      cursor: pointer; border: 1.5px solid; line-height: 1.2;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, opacity 0.15s ease;
      background: transparent; white-space: nowrap;
    }
    .po-poke-fish-row { margin-bottom: 10px; }
    .po-poke-fish-lbl {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink); opacity: 0.32; margin-bottom: 7px;
    }

    /* Total panel */
    .po-total-col { position: sticky; top: 84px; }
    .po-total-panel { background: #fff; border: 1px solid rgba(26,26,26,0.08); border-radius: 3px; padding: 24px; }
    .po-total-ttl { font-family: 'DM Sans', sans-serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--driftwood); opacity: 0.6; margin-bottom: 14px; }
    .po-total-rows { margin-bottom: 14px; }
    .po-total-row { display: flex; justify-content: space-between; align-items: baseline; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink); padding: 4px 0; border-bottom: 1px solid rgba(26,26,26,0.05); gap: 8px; }
    .po-total-row:last-child { border-bottom: none; }
    .po-total-row-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: 0.78; }
    .po-total-row-qty { opacity: 0.42; flex-shrink: 0; }
    .po-total-row-price { flex-shrink: 0; opacity: 0.78; }
    .po-total-empty { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink); opacity: 0.28; text-align: center; padding: 16px 0 12px; }
    .po-ucsc-email-hint { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--driftwood); opacity: 0.7; margin-top: 5px; display: block; }
    .po-total-sub-row { display: flex; justify-content: space-between; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink); opacity: 0.55; padding: 3px 0; }
    .po-total-fee-row { display: flex; justify-content: space-between; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink); opacity: 0.55; padding: 3px 0; }
    .po-total-divider { height: 1px; background: rgba(26,26,26,0.08); margin: 14px 0; }
    .po-total-amount { display: flex; justify-content: space-between; align-items: baseline; font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 500; color: var(--ink); margin-bottom: 18px; }
    .po-total-lbl { font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 0.08em; opacity: 0.42; }

    /* Buttons */
    .po-btn-proceed {
      width: 100%; background: var(--ink); color: var(--cream); border: none;
      padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 10px;
      letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer;
      border-radius: 2px; transition: opacity 0.2s ease, transform 0.15s ease;
    }
    .po-btn-proceed:hover:not(:disabled) { opacity: 0.82; }
    .po-btn-proceed:active:not(:disabled) { transform: scale(0.98); }
    .po-btn-proceed:disabled { opacity: 0.22; cursor: not-allowed; }
    .po-btn-back {
      background: transparent; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink); opacity: 0.4; cursor: pointer; padding: 0;
      transition: opacity 0.2s ease; margin-right: 24px; flex-shrink: 0;
    }
    .po-btn-back:hover { opacity: 0.8; }
    .po-step-actions { display: flex; align-items: center; margin-top: 32px; }

    /* Step 2 — form */
    .po-form { max-width: 560px; }
    .po-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .po-form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .po-label { font-family: 'DM Sans', sans-serif; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink); opacity: 0.5; }
    .po-input, .po-textarea {
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink);
      background: #fff; border: 1px solid rgba(26,26,26,0.12); border-radius: 2px;
      padding: 12px 14px; outline: none; transition: border-color 0.2s ease;
      -webkit-appearance: none; width: 100%; box-sizing: border-box;
    }
    .po-input:focus, .po-textarea:focus { border-color: var(--ink); }
    .po-input.err { border-color: #b87a5a; }
    .po-field-err { font-family: 'DM Sans', sans-serif; font-size: 11px; color: #b87a5a; }
    .po-field-hint { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink); opacity: 0.38; line-height: 1.6; margin-top: 5px; display: block; }
    .po-textarea { resize: vertical; min-height: 88px; line-height: 1.6; }
    /* Date grid */
    .po-date-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .po-date-btn { padding: 9px 13px; border: 1px solid rgba(26,26,26,0.12); border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink); background: #fff; cursor: pointer; transition: all 0.15s ease; display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 50px; }
    .po-date-btn:hover { border-color: rgba(26,26,26,0.28); }
    .po-date-btn.on { background: var(--ink); border-color: var(--ink); color: var(--cream); }
    .po-date-day { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.55; }
    .po-date-btn.on .po-date-day { opacity: 0.65; }
    .po-date-num { font-size: 15px; }

    /* Time slots */
    .po-slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 24px; }
    .po-slot-col { display: flex; flex-direction: column; gap: 3px; }
    .po-slot-hour { font-family: 'DM Sans', sans-serif; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); opacity: 0.45; margin-bottom: 4px; text-align: center; }
    .po-slot-btn { background: rgba(26,26,26,0.04); border: 1px solid rgba(26,26,26,0.10); border-radius: 2px; padding: 5px 2px; font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink); cursor: pointer; transition: background 0.12s, border-color 0.12s; text-align: center; }
    .po-slot-btn:hover:not(.booked) { background: rgba(26,26,26,0.09); border-color: rgba(26,26,26,0.25); }
    .po-slot-btn.on { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .po-slot-btn.booked { opacity: 0.22; cursor: not-allowed; pointer-events: none; text-decoration: line-through; }
    .po-slot-full { font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #b87a5a; padding: 16px 0 24px; }
    .po-slot-hint { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink); opacity: 0.45; padding: 12px 0 24px; }
    .po-slot-conflict { font-family: 'DM Sans', sans-serif; font-size: 12px; color: #b87a5a; margin-bottom: 16px; }
    @media (max-width: 480px) { .po-slot-grid { grid-template-columns: repeat(2, 1fr); } }
    .po-mode-note { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink); opacity: 0.42; font-style: italic; margin-top: -8px; margin-bottom: 18px; }

    /* Promo code */
    .po-promo-row { display: flex; gap: 8px; margin-bottom: 5px; }
    .po-promo-row .po-input { flex: 1; margin-bottom: 0; text-transform: uppercase; letter-spacing: 0.06em; }
    .po-promo-apply { padding: 0 18px; border: 1px solid rgba(26,26,26,0.18); border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; background: transparent; color: var(--ink); cursor: pointer; white-space: nowrap; transition: all 0.15s ease; }
    .po-promo-apply:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .po-promo-feedback { font-family: 'DM Sans', sans-serif; font-size: 11px; margin-top: 5px; }
    .po-promo-feedback.valid { color: var(--ogo); }
    .po-promo-feedback.invalid { color: #b87a5a; }

    /* Step 3 — review */
    .po-review-block { background: #fff; border: 1px solid rgba(26,26,26,0.07); border-radius: 3px; padding: 24px; margin-bottom: 14px; max-width: 600px; }
    .po-review-ttl { font-family: 'DM Sans', sans-serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--driftwood); opacity: 0.6; margin-bottom: 14px; }
    .po-review-row { display: flex; justify-content: space-between; align-items: baseline; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); padding: 5px 0; border-bottom: 1px solid rgba(26,26,26,0.05); gap: 12px; }
    .po-review-row:last-child { border-bottom: none; }
    .po-review-row-name { flex: 1; }
    .po-review-row-qty { opacity: 0.42; }
    .po-review-row-price { opacity: 0.7; }
    .po-review-detail { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); line-height: 1.75; opacity: 0.72; }
    .po-review-total-row { display: flex; justify-content: space-between; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; color: var(--ink); padding-top: 14px; margin-top: 6px; border-top: 1px solid rgba(26,26,26,0.1); }
    .po-payment-note { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink); opacity: 0.38; font-style: italic; margin-top: 8px; }
    .po-ucsc-section { margin-top: 24px; padding: 18px 20px; background: rgba(26,26,26,0.03); border-left: 2px solid var(--driftwood); }
    .po-ucsc-label { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .po-ucsc-check { width: 16px; height: 16px; flex-shrink: 0; accent-color: var(--driftwood); cursor: pointer; }
    .po-ucsc-text { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); }
    .po-ucsc-note { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--driftwood); margin-top: 8px; margin-left: 28px; opacity: 0.85; }
    .po-review-discount { color: #5a8a5a; }
    .po-office-block { padding: 14px 18px; background: rgba(196,168,130,0.08); border-left: 2px solid var(--driftwood); margin-bottom: 20px; }
    .po-office-loc { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); margin-bottom: 4px; }
    .po-review-notices {
      max-width: 600px;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .po-notice {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      line-height: 1.75;
      color: var(--ink);
      opacity: 0.38;
      padding: 14px 18px;
      border-left: 2px solid rgba(26,26,26,0.1);
    }
    .po-notice em { font-style: italic; }
    .po-sms-consent { margin-top: 20px; padding: 16px 20px; background: rgba(26,26,26,0.03); border: 1px solid rgba(26,26,26,0.07); border-radius: 2px; }
    .po-sms-consent.err { border-color: #b87a5a; background: rgba(184,122,90,0.05); }
    .po-sms-consent-label { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
    .po-sms-consent-check { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; accent-color: var(--driftwood); cursor: pointer; }
    .po-sms-consent-text { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink); line-height: 1.65; opacity: 0.7; }
    .po-sms-consent-err { font-family: 'DM Sans', sans-serif; font-size: 11px; color: #b87a5a; margin-top: 8px; margin-left: 28px; }
    .po-submit-btn { background: var(--ink); color: var(--cream); border: none; padding: 16px 40px; font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: opacity 0.2s ease, transform 0.15s ease; }
    .po-submit-btn:hover { opacity: 0.82; }
    .po-submit-btn:active { transform: scale(0.99); }

    /* Confirmation */
    .po-confirm { text-align: center; padding: 48px 0 24px; }

      { name: 'Shoyu Ahi',           fish: 'ahi',    color: '#4a6080' },
      { name: 'Wasabi Shoyu Ahi',    fish: 'ahi',    color: '#6a9a5a' },
      { name: 'Chili Garlic Ahi',    fish: 'ahi',    color: '#c4523a' },

    const PROMO_CODES = {

    /* ── Choice helpers ── */
    function needsChoice(it) {
      return it.requiresFlavorChoice || it.requiresPokeChoice || it.requiresHandrollChoice;
    }

    function hasChoice(it, choices, qty) {
      if (!needsChoice(it)) return true;
      qty = qty || 1;
      if (it.requiresHandrollChoice) {
        for (let i = 0; i < qty; i++) {
          const c = choices[`${it.id}_${i}`];
          if (!Array.isArray(c) || c.length < 2) return false;
        }
        return true;
      }
      for (let i = 0; i < qty; i++) {
        if (!choices[`${it.id}_${i}`]) return false;
      }
      return true;
    }

    function choiceText(it, choices, qty) {
      if (!needsChoice(it)) return '';
      qty = qty || 1;
      if (it.requiresHandrollChoice) {
        const parts = [];
        for (let i = 0; i < qty; i++) {
          const c = choices[`${it.id}_${i}`];
          if (Array.isArray(c) && c.length > 0) {
            const counts = {};
            c.forEach(name => { counts[name] = (counts[name] || 0) + 1; });
            parts.push(Object.entries(counts).map(([name, cnt]) => cnt > 1 ? `${name} ×${cnt}` : name).join(' + '));
          }
        }
        if (!parts.length) return '';
        return qty > 1 ? parts.map((p, i) => `#${i+1}: ${p}`).join(' / ') : parts[0];
      }
      const unitChoices = [];
      for (let i = 0; i < qty; i++) {
        const c = choices[`${it.id}_${i}`];
        if (c) unitChoices.push(c);
      }
      if (!unitChoices.length) return '';
      if (qty === 1 || unitChoices.every(c => c === unitChoices[0])) {
        return unitChoices[0] + (qty > 1 ? ` ×${qty}` : '');
      }
      return unitChoices.join(' / ');
    }

    /* ── Visibility helpers ── */
    function isFormOpen() {
      const now = new Date();
      const key = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
      if (key === '2026-07-02') return true; // Temp: July 3 pre-orders open July 2 only
      if (key === '2026-07-18') return true; // Temp: Sat Jul 18 open for Sun Jul 19 orders
      if (key < '2026-06-14') return false;
      const d = now.getDay();
      return d === 0 || d === 3;
    }

    function getNextOpening() {
      const now = new Date();
      const key = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
      if (key < '2026-06-14') return new Date('2026-06-14T00:00:00');
      const day   = now.getDay();
      const toSun = (7 - day) % 7 || 7;
      const toWed = (3 - day + 7) % 7 || 7;
      const next  = new Date(now);
      next.setDate(now.getDate() + Math.min(toSun, toWed));
      next.setHours(0, 0, 0, 0);
      return next;
    }

    /* ── Closed / countdown view ── */
    function ClosedView({ onOpen }) {
      const [, setTick] = useState(0);

      useEffect(() => {
        const id = setInterval(() => {
          if (isFormOpen()) { onOpen(); return; }
          setTick(t => t + 1);
        }, 1000);
        return () => clearInterval(id);
      }, []);

      const next  = getNextOpening();
      const diff  = Math.max(0, next - new Date());
      const days  = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins  = Math.floor((diff % 3600000)  / 60000);
      const secs  = Math.floor((diff % 60000)    / 1000);
      const units = [{ v: days, l: 'days' }, { v: hours, l: 'hrs' }, { v: mins, l: 'min' }, { v: secs, l: 'sec' }];
      const nextLabel = next.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' }).toLowerCase();

      return (
        <div className="po-closed">
          <div className="po-closed-label">O &nbsp;R &nbsp;D &nbsp;E &nbsp;R &nbsp;S</div>
          <h2 className="po-closed-heading">pre-orders are<br/>currently closed</h2>
          <p className="po-closed-sub">the order form opens every sunday and wednesday</p>
          <div className="po-countdown">
            {units.map(({ v, l }) => (
              <div key={l} className="po-cd-block">
                <span className="po-cd-num">{String(v).padStart(2, '0')}</span>
                <span className="po-cd-lbl">{l}</span>
              </div>
            ))}
          </div>
          <p className="po-closed-next">next opening — {nextLabel}</p>
        </div>
      );
    }

    function getWindowDates() {
      const DAYS = ['sun','mon','tue','wed','thu','fri','sat'];
      const now  = new Date();
      const todayKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
      // Temp: July 2 override — only Friday July 3 available
      if (todayKey === '2026-07-02') return [{ key:'2026-07-03', day:'fri', num:3, month:7, dayOfWeek:5 }];
      // Temp: Sat Jul 18 — only Sunday Jul 19 available
      if (todayKey === '2026-07-18') return [{ key:'2026-07-19', day:'sun', num:19, month:7, dayOfWeek:0 }];
      const today = now.getDay();
      let daysBack = 0;
      for (let i = 0; i <= 6; i++) {
        const d = (today - i + 7) % 7;
        if (d === 0 || d === 3) { daysBack = i; break; }
      }
      const anchor = new Date(now);
      anchor.setDate(now.getDate() - daysBack);
      const openDay = anchor.getDay();
      const offsets = openDay === 0 ? [1, 2] : [1, 2, 3]; // Sun → Mon+Tue; Wed → Thu+Fri+Sat
      return offsets.map(off => {
        const d = new Date(anchor);
        d.setDate(anchor.getDate() + off);
        return {
          key:       `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`,
          day:       DAYS[d.getDay()],
          num:       d.getDate(),
          month:     d.getMonth() + 1,
          dayOfWeek: d.getDay(),
        };
      });
    }

    // 48 five-minute pickup slots: 12:00 PM → 4:00 PM
    const TIME_SLOTS = (() => {
      const fmt = (h, m) => `${h > 12 ? h - 12 : h}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
      const out = [];
      for (let min = 0; min < 240; min += 5) {
        const h = 12 + Math.floor(min / 60), m = min % 60;
        const eh = 12 + Math.floor((min + 5) / 60), em = (min + 5) % 60;
        out.push({ label: `${fmt(h,m)} – ${fmt(eh,em)}`, key: `${String(h).padStart(2,'0')}${String(m).padStart(2,'0')}` });
      }
      return out;
    })();

    function useBookedSlots(date) {
      const [booked,  setBooked]  = useState(new Set());
      const [loading, setLoading] = useState(false);
      useEffect(() => {
        if (!date || !db) { setBooked(new Set()); return; }
        setLoading(true);
        const unsub = db.collection('slots').where('date','==',date)
          .onSnapshot(
            snap => { setBooked(new Set(snap.docs.map(d => d.data().slotKey))); setLoading(false); },
            err  => { console.error('[inoa] slots error:', err); setLoading(false); }
          );
        return () => unsub();
      }, [date]);
      return { booked, loading };
    }

      const d = v.replace(/\D/g,'').slice(0,10);
      if (d.length <= 3) return d;
      if (d.length <= 6) return `(${d.slice(0,3)}) ${d.slice(3)}`;
      return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    }

    /* ── Poke choice picker (fish × flavor, per unit) ── */
    function PokeChoicePicker({ itemId, unitIndex, unitTotal, choices, setChoices }) {
      const key      = `${itemId}_${unitIndex}`;
      const selected = choices[key];
      const ahi    = POKE_CHOICES.filter(c => c.fish === 'ahi');

      return (
        <div className="po-flavor-picker">
          <div className="po-flavor-hdr">
            {unitTotal > 1 && <span style={{opacity:0.45,marginRight:'6px'}}>item {unitIndex+1}</span>}

            <div key={grp.label} className="po-poke-fish-row">
              <div className="po-poke-fish-lbl">{grp.label}</div>
              <div className="po-flavor-chips">
                {grp.items.map(c => {
                  const on = selected === c.name;
                  const flavor = c.name.replace(' Ahi','').replace(' Salmon','');
                  return (
                    <button key={c.name} className="po-flavor-chip" onClick={() => pick(c.name)}
                      style={{ borderColor: on?c.color:'rgba(26,26,26,0.12)', color: on?c.color:'rgba(26,26,26,0.45)', background: on?c.color+'1a':'transparent' }}>
                      {flavor}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    /* ── Handroll poke picker (fish × flavor, pick 2, duplicates ok, per unit) ── */
    function HandrollPokeChoicePicker({ itemId, unitIndex, unitTotal, choices, setChoices }) {
      const key   = `${itemId}_${unitIndex}`;
      const cur   = Array.isArray(choices[key]) ? choices[key] : [];
      const total = cur.length;
      const ahi    = POKE_CHOICES.filter(c => c.fish === 'ahi');
      const salmon = POKE_CHOICES.filter(c => c.fish === 'salmon');
      function toggle(name) {
        setChoices(prev => {
          const c     = Array.isArray(prev[key]) ? prev[key] : [];
          const count = c.filter(n => n === name).length;
          if (count > 0 && c.length >= 2) { const next=[...c]; next.splice(c.indexOf(name),1); return { ...prev, [key]: next }; }
          if (c.length < 2) return { ...prev, [key]: [...c, name] };
          return prev;
        });
      }
      return (
        <div className="po-flavor-picker">
          <div className="po-flavor-hdr">
            {unitTotal > 1 && <span style={{opacity:0.45,marginRight:'6px'}}>item {unitIndex+1}</span>}
            {total >= 2 ? 'poke selections ✓' : `choose 2 poke · ${total}/2`}
          </div>
          {[{ label:'ahi', items:ahi },{ label:'salmon', items:salmon }].map(grp => (
            <div key={grp.label} className="po-poke-fish-row">
              <div className="po-poke-fish-lbl">{grp.label}</div>
              <div className="po-flavor-chips">
                {grp.items.map(c => {
                  const count    = cur.filter(n => n === c.name).length;
                  const on       = count > 0;
                  const disabled = count === 0 && total >= 2;
                  const flavor   = c.name.replace(' Ahi','').replace(' Salmon','');
                  return (
                    <button key={c.name} className="po-flavor-chip" onClick={() => !disabled && toggle(c.name)}
                      style={{ borderColor: on?c.color:'rgba(26,26,26,0.12)', color: on?c.color:'rgba(26,26,26,0.45)', background: on?c.color+'1a':'transparent', opacity: disabled?0.22:1, position:'relative' }}>
                      {flavor}
                      {count === 2 && (
                        <span style={{ position:'absolute', top:'-7px', right:'-7px', width:'16px', height:'16px', borderRadius:'50%', background:c.color, color:'#fff', fontSize:'9px', fontWeight:600, display:'flex', alignItems:'center', justifyContent:'center', lineHeight:1 }}>×2</span>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    /* ── Running total panel ── */
    function TotalPanel({ qtys, onProceed, choices }) {
      const lines         = ITEMS.filter(it => (qtys[it.id]||0) > 0);
      const subtotal      = lines.reduce((s,it) => s + it.price*(qtys[it.id]||0), 0);
      const missingChoice = lines.some(it => !hasChoice(it, choices, qtys[it.id]||0));
      const disabled      = lines.length === 0 || missingChoice;

      return (
        <div className="po-total-panel">
          <div className="po-total-ttl">your order</div>
          {lines.length === 0
            ? <div className="po-total-empty">no items yet</div>
            : <div className="po-total-rows">
                {lines.map(it => {
                  const ct = choiceText(it, choices, qtys[it.id]||0);
                  return (
                    <div key={it.id} className="po-total-row">
                      <span className="po-total-row-name">{it.name}{ct ? ` — ${ct}` : ''}</span>
                      <span className="po-total-row-qty">×{qtys[it.id]}</span>
                      <span className="po-total-row-price">${(it.price*qtys[it.id]).toFixed(2).replace('.00','')}</span>
                    </div>
                  );
                })}
              </div>
          }
          <div className="po-total-divider" />
          <div className="po-total-amount"><span className="po-total-lbl">total</span><span>${subtotal.toFixed(2).replace('.00','')}</span></div>
          <button
            className="po-btn-proceed"
            onClick={onProceed}
            disabled={disabled}
            style={{marginTop: lines.length > 0 ? '14px' : undefined}}
          >
            {lines.length === 0
              ? 'add items to continue'
              : missingChoice
              ? 'select your flavors to continue'
              : 'continue to details →'}
          </button>
        </div>
      );
    }

    /* ── Step 1 ── */
    function Step1({ qtys, setQtys, onNext, choices, setChoices }) {
      function change(id, delta) {
        setQtys(prev => {
          const oldQty = prev[id]||0;
          const newQty = Math.max(0, oldQty + delta);
          if (delta < 0 && newQty < oldQty) {
            setChoices(c => { const nc={...c}; for(let i=newQty;i<oldQty;i++) delete nc[`${id}_${i}`]; return nc; });
          }
          return { ...prev, [id]: newQty };
        });
      }

      return (
        <div className="po-step-content">
          <div className="po-order-layout">
            <div className="po-items-col">

              {/* Pickup notice */}
              <p className="po-mode-note" style={{marginTop:'0',marginBottom:'28px'}}>pickup only · 100 Enterprise Way, Scotts Valley, CA 95066</p>

              {/* Menu groups */}
              {GROUPS.map((group, gi) => (
                <div key={group}>
                  <div className="po-group-hdr" style={{marginTop: gi===0 ? 0 : 36}}>
                    <div className="po-group-label">{group}</div>
                    {GROUP_META[group] && <p className="po-group-desc">{GROUP_META[group]}</p>}
                  </div>
                  {ITEMS.filter(it => it.group===group).map(it => (
                    <div key={it.id}>
                      <div
                        className={`po-item-card${(qtys[it.id]||0)>0?' selected':''}`}
                        style={{marginBottom: needsChoice(it) && (qtys[it.id]||0)>0 ? 0 : undefined}}
                      >
                        <div className="po-item-info">
                          <div className="po-item-name">{it.name}</div>
                          {it.detail && <div className="po-item-meta">{it.detail}</div>}
                        </div>
                        <div className="po-item-price">${it.price}</div>
                        {it.soldOut
                          ? <div style={{fontSize:'11px',fontFamily:"'DM Sans',sans-serif",color:'var(--driftwood)',opacity:0.55,fontStyle:'italic',minWidth:'60px',textAlign:'right'}}>sold out</div>
                          : <div className="po-qty">
                              <button className="po-qty-btn" onClick={() => change(it.id,-1)} disabled={(qtys[it.id]||0)===0}>−</button>
                              <span className="po-qty-val">{qtys[it.id]||0}</span>
                              <button className="po-qty-btn" onClick={() => change(it.id, 1)}>+</button>
                            </div>
                        }
                      </div>
                      {(qtys[it.id]||0) > 0 && it.requiresFlavorChoice &&
                        Array.from({ length: qtys[it.id]||0 }, (_,i) => (
                          <FlavorPicker key={`${it.id}_${i}`} itemId={it.id} unitIndex={i} unitTotal={qtys[it.id]||0} choices={choices} setChoices={setChoices} />
                        ))
                      }
                      {(qtys[it.id]||0) > 0 && it.requiresHandrollChoice &&
                        Array.from({ length: qtys[it.id]||0 }, (_,i) => (
                          <HandrollPokeChoicePicker key={`${it.id}_${i}`} itemId={it.id} unitIndex={i} unitTotal={qtys[it.id]||0} choices={choices} setChoices={setChoices} />
                        ))
                      }
                      {(qtys[it.id]||0) > 0 && it.requiresPokeChoice &&
                        Array.from({ length: qtys[it.id]||0 }, (_,i) => (
                          <PokeChoicePicker key={`${it.id}_${i}`} itemId={it.id} unitIndex={i} unitTotal={qtys[it.id]||0} choices={choices} setChoices={setChoices} />
                        ))
                      }
                    </div>
                  ))}
                </div>
              ))}

            </div>
            <div className="po-total-col">
              <TotalPanel qtys={qtys} onProceed={onNext} choices={choices} />
            </div>
          </div>
        </div>
      );
    }

    /* ── Step 2 ── */
    function Step2({ details, setDetails, onNext, onBack, pickupDates, slotConflict, onClearSlotConflict }) {
      const [errors,      setErrors]      = useState({});
      const [promoInput,  setPromoInput]  = useState(details.promoCode || '');
      const [promoStatus, setPromoStatus] = useState(details.promoCode ? 'valid' : null);
      const { booked: bookedSlots, loading: slotsLoading } = useBookedSlots(details.date);
      const allBooked = !!details.date && !slotsLoading && TIME_SLOTS.every(s => bookedSlots.has(s.key));

      function set(field, val) {
        setDetails(prev => ({ ...prev, [field]: val }));
        setErrors(prev => ({ ...prev, [field]: false }));
      }
      function applyPromo() {
        const code  = promoInput.trim().toLowerCase();
        const promo = PROMO_CODES[code];
        if (promo) {
          setDetails(prev => ({ ...prev, promoCode: code, promoDiscount: promo.discount || 0, promoFreeMusubi: !!promo.freeMusubi }));
          setPromoStatus('valid');
        } else {
          setDetails(prev => ({ ...prev, promoCode: '', promoDiscount: 0, promoFreeMusubi: false }));
          setPromoStatus(null);
        }
      }
      function validate() {
        const e = {};
        if (!details.firstName?.trim()) e.firstName = 'required';
        if (!details.lastName?.trim())  e.lastName  = 'required';
        if (!details.phone?.trim() || details.phone.replace(/\D/g,'').length < 10) e.phone = 'enter a valid phone number';
        if (!details.email?.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(details.email)) e.email = 'enter a valid email';
        if (!details.date) e.date = 'select a date';
        if (!details.time) e.time = 'select a time';
        setErrors(e);
        return Object.keys(e).length === 0;
      }
      return (
        <div className="po-step-content">
          <div className="po-form">
            <div className="po-form-row">
              <div className="po-form-group">
                <label className="po-label">first name</label>
                <input className={`po-input${errors.firstName?' err':''}`} value={details.firstName||''} onChange={e=>set('firstName',e.target.value)} placeholder="kai" />
                {errors.firstName && <span className="po-field-err">{errors.firstName}</span>}
              </div>
              <div className="po-form-group">
                <label className="po-label">last name</label>
                <input className={`po-input${errors.lastName?' err':''}`} value={details.lastName||''} onChange={e=>set('lastName',e.target.value)} placeholder="nakamura" />
                {errors.lastName && <span className="po-field-err">{errors.lastName}</span>}
              </div>
            </div>
            <div className="po-form-group">
              <label className="po-label">phone</label>
              <input className={`po-input${errors.phone?' err':''}`} value={details.phone||''} onChange={e=>set('phone',fmtPhone(e.target.value))} placeholder="(831) 555-0100" inputMode="tel" />
              {errors.phone && <span className="po-field-err">{errors.phone}</span>}
              <span className="po-field-hint">confirmation and pickup details will be texted to this number</span>
            </div>
            <div className="po-form-group">
              <label className="po-label">email</label>
              <input className={`po-input${errors.email?' err':''}`} type="email" value={details.email||''} onChange={e=>set('email',e.target.value)} placeholder="you@email.com" />
              {errors.email && <span className="po-field-err">{errors.email}</span>}
            </div>

            <div className="po-office-block" style={{marginBottom:'20px'}}>
              <p className="po-office-loc">pickup · 100 Enterprise Way, Scotts Valley, CA 95066</p>
            </div>

            <div className="po-label" style={{marginBottom:'10px'}}>
              pickup date
              {errors.date && <span className="po-field-err" style={{marginLeft:'8px',textTransform:'none',letterSpacing:0}}>{errors.date}</span>}
            </div>
            <div className="po-date-grid">
              {pickupDates.map(d => (
                <button key={d.key} className={`po-date-btn${details.date===d.key?' on':''}`} onClick={()=>{ set('date',d.key); set('time',''); }}>
                  <span className="po-date-day">{d.day}</span>
                  <span className="po-date-num">{d.num}</span>
                </button>
              ))}
            </div>

            <div className="po-label" style={{marginBottom:'10px'}}>
              pickup time
              {errors.time && <span className="po-field-err" style={{marginLeft:'8px',textTransform:'none',letterSpacing:0}}>{errors.time}</span>}
            </div>
            {slotConflict && <p className="po-slot-conflict">That slot was just booked — please pick another time.</p>}
            {!details.date ? (
              <p className="po-slot-hint">select a date above to see available times</p>
            ) : slotsLoading ? (
              <p className="po-slot-hint">loading available times…</p>
            ) : allBooked ? (
              <p className="po-slot-full">fully booked for this day</p>
            ) : (
              <div className="po-slot-grid">
                {[0,1,2,3].map(hour => {
                  const hourSlots = TIME_SLOTS.slice(hour * 12, (hour + 1) * 12);
                  const hourLabel = hour === 0 ? '12 pm' : `${hour} pm`;
                  return (
                    <div key={hour} className="po-slot-col">
                      <div className="po-slot-hour">{hourLabel}</div>
                      {hourSlots.map(s => {
                        const isBooked   = bookedSlots.has(s.key);
                        const isSelected = details.time === s.label;
                        const h = parseInt(s.key.slice(0,2));
                        const display = `${h > 12 ? h - 12 : h}:${s.key.slice(2)}`;
                        return (
                          <button
                            key={s.key}
                            className={`po-slot-btn${isBooked ? ' booked' : ''}${isSelected ? ' on' : ''}`}
                            onClick={() => { if (!isBooked) { set('time', s.label); onClearSlotConflict(); } }}
                          >
                            {display}
                          </button>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            )}

            <div className="po-form-group">
              <label className="po-label">voucher # <span style={{opacity:0.45}}>(optional)</span></label>
              <input className="po-input" value={details.voucher||''} onChange={e=>set('voucher',e.target.value)} placeholder="e.g. V-0042" />
              <span className="po-field-hint">bring your physical voucher at pickup — drop it in the jar</span>
            </div>

            <div className="po-form-group" style={{marginTop:'4px'}}>
              <label className="po-label">special instructions <span style={{opacity:0.45}}>(optional)</span></label>
              <textarea className="po-textarea" value={details.notes||''} onChange={e=>set('notes',e.target.value)} placeholder="allergies, preferences, or notes" />
            </div>

            <div className="po-form-group">
              <label className="po-label">promo code <span style={{opacity:0.45}}>(optional)</span></label>
              <div className="po-promo-row">
                <input
                  className="po-input"
                  value={promoInput}
                  onChange={e => { setPromoInput(e.target.value.toUpperCase()); setPromoStatus(null); setDetails(prev => ({ ...prev, promoCode: '', promoDiscount: 0 })); }}
                  onKeyDown={e => e.key === 'Enter' && applyPromo()}
                  placeholder="ENTER CODE"
                  autoComplete="off"
                />
                <button className="po-promo-apply" onClick={applyPromo}>apply</button>
              </div>
              {promoStatus === 'valid' && details.promoFreeMusubi && <p className="po-promo-feedback valid">✓ Free spam musubi added to your order</p>}
              {promoStatus === 'valid' && !details.promoFreeMusubi && <p className="po-promo-feedback valid">✓ {Math.round((details.promoDiscount||0)*100)}% off applied</p>}
            </div>

            <div className="po-ucsc-section">
              <label className="po-ucsc-label">
                <input
                  type="checkbox"
                  className="po-ucsc-check"
                  checked={details.ucscStudent||false}
                  onChange={e=>set('ucscStudent', e.target.checked)}
                />
                <span className="po-ucsc-text">i'm a UC Santa Cruz student</span>
              </label>
              <p className="po-ucsc-note">UC Santa Cruz students get 10% off their order</p>
            </div>

            <div className="po-step-actions">
              <button className="po-btn-back" onClick={onBack}>← back</button>
              <button className="po-btn-proceed" style={{maxWidth:'240px'}} onClick={()=>{ if(validate()) onNext(); }}>review order →</button>
            </div>
          </div>
        </div>
      );
    }

    /* ── Step 3 ── */
    function Step3({ qtys, details, choices, onSubmit, onBack, slotConflict }) {
      const [smsConsent, setSmsConsent] = useState(false);
      const [smsError,   setSmsError]   = useState(false);
      function handleSubmit() {
        if (!smsConsent) { setSmsError(true); return; }
        onSubmit();
      }
      const lines         = ITEMS.filter(it => (qtys[it.id]||0) > 0);
      const subtotal      = lines.reduce((s,it) => s + it.price*(qtys[it.id]||0), 0);
      const ucscDiscount  = details.ucscStudent   ? Math.round(subtotal * 0.10 * 100) / 100 : 0;
      const promoDiscount = details.promoDiscount ? Math.round(subtotal * details.promoDiscount * 100) / 100 : 0;
      const finalTotal    = subtotal - ucscDiscount - promoDiscount;
      return (
        <div className="po-step-content">
          <div className="po-review-block">
            <div className="po-review-ttl">your order</div>
            {lines.map(it => {
              const ct = choiceText(it, choices, qtys[it.id]||0);
              return (
                <div key={it.id} className="po-review-row">
                  <span className="po-review-row-name">{it.name}{ct ? ` — ${ct}` : ''}</span>
                  <span className="po-review-row-qty">×{qtys[it.id]}</span>
                  <span className="po-review-row-price">${(it.price*qtys[it.id]).toFixed(2).replace('.00','')}</span>
                </div>
              );
            })}
            {ucscDiscount > 0 && (
              <div className="po-review-row po-review-discount">
                <span className="po-review-row-name">ucsc student discount (10%)</span>
                <span className="po-review-row-qty"></span>
                <span className="po-review-row-price">−${ucscDiscount.toFixed(2)}</span>
              </div>
            )}
            {details.promoFreeMusubi && (
              <div className="po-review-row">
                <span className="po-review-row-name">Spam Musubi — TANIKA promo</span>
                <span className="po-review-row-qty">×1</span>
                <span className="po-review-row-price">free</span>
              </div>
            )}
            {promoDiscount > 0 && (
              <div className="po-review-row po-review-discount">
                <span className="po-review-row-name">promo code — {details.promoCode.toUpperCase()} ({Math.round(details.promoDiscount*100)}% off)</span>
                <span className="po-review-row-qty"></span>
                <span className="po-review-row-price">−${promoDiscount.toFixed(2)}</span>
              </div>
            )}
            <div className="po-review-total-row"><span>total</span><span>${finalTotal.toFixed(2)}</span></div>
            <p className="po-payment-note">payment collected at pickup</p>
          </div>

          <div className="po-review-block">
            <div className="po-review-ttl">your details</div>
            <p className="po-review-detail">
              {details.firstName} {details.lastName}<br/>
              {details.phone}<br/>
              {details.email}
            </p>
          </div>

          <div className="po-review-block">
            <div className="po-review-ttl">pickup details</div>
            <p className="po-review-detail">
              {fmtDate(details.date)} at {details.time}<br/>
              100 Enterprise Way, Scotts Valley, CA 95066
            </p>
            {details.voucher && <p className="po-review-detail" style={{marginTop:'8px',opacity:0.55}}>voucher: {details.voucher}</p>}
            {details.notes && <p className="po-review-detail" style={{marginTop:'10px',opacity:0.45}}>note: {details.notes}</p>}
          </div>

          <div className="po-review-notices">
            <p className="po-notice">
              <em>*Consuming raw or undercooked meats, poultry, seafood, shellfish, or eggs may increase your risk of foodborne illness. By ordering you voluntarily relinquish any liability of any illnesses that may occur.*</em>
            </p>
            <p className="po-notice">
              A text will be sent regarding your receipt &amp; pickup details and confirmation following order placement.<br/>
              <strong>Order will be canceled if not confirmed within 12 hours after confirmation text is sent.</strong>
            </p>
          </div>

          <div className={`po-sms-consent${smsError ? ' err' : ''}`}>
            <label className="po-sms-consent-label">
              <input
                type="checkbox"
                className="po-sms-consent-check"
                checked={smsConsent}
                onChange={e => { setSmsConsent(e.target.checked); if (e.target.checked) setSmsError(false); }}
              />
              <span className="po-sms-consent-text">By submitting this form, I agree to receive order confirmation and status updates via text message from Inoa Food Group. Message &amp; data rates may apply. Reply STOP to unsubscribe.</span>
            </label>
            {smsError && <p className="po-sms-consent-err">You must agree to receive SMS updates to place an order.</p>}
          </div>

          {slotConflict && (
            <p className="po-slot-conflict" style={{marginBottom:'12px'}}>
              That pickup time was just booked by someone else — go back and pick a different slot.
            </p>
          )}
          <div className="po-step-actions">
            <button className="po-btn-back" onClick={onBack}>← back</button>
            <button className="po-submit-btn" onClick={handleSubmit}>place order</button>
          </div>
        </div>
      );
    }

    /* ── Confirmation ── */
    function ConfirmView({ qtys, details, choices, onReset }) {
      const lines         = ITEMS.filter(it => (qtys[it.id]||0) > 0);
      const subtotal      = lines.reduce((s,it) => s + it.price*(qtys[it.id]||0), 0);
      const ucscDiscount  = details.ucscStudent   ? Math.round(subtotal * 0.10 * 100) / 100 : 0;
      const promoDiscount = details.promoDiscount ? Math.round(subtotal * details.promoDiscount * 100) / 100 : 0;
      const total         = subtotal - ucscDiscount - promoDiscount;
      return (
        <div className="po-confirm po-step-content">
          <div className="po-confirm-check">✓</div>
          <h3 className="po-confirm-heading">order received</h3>
          <p className="po-confirm-body">
            thanks, {details.firstName}. we'll confirm your order via text within 24 hours.
          </p>
          <div className="po-confirm-summary">
            <div className="po-review-ttl">order summary</div>
            {lines.map(it => {
              const ct = choiceText(it, choices, qtys[it.id]||0);
              return (
                <div key={it.id} className="po-confirm-row">
                  <span>{it.name}{ct ? ` — ${ct}` : ''} ×{qtys[it.id]}</span>
                  <span>${(it.price*qtys[it.id]).toFixed(2).replace('.00','')}</span>
                </div>
              );
            })}
            <div className="po-review-total-row"><span>total</span><span>${total.toFixed(2)}</span></div>
            <p className="po-review-detail" style={{marginTop:'12px',fontSize:'12px'}}>
              pickup: {fmtDate(details.date)} at {details.time}
            </p>
          </div>
          <div className="po-confirm-actions">
            <button className="po-new-order-btn" onClick={onReset}>place another order</button>
            <a href="/home" className="po-back-home-btn">back to menu</a>
          </div>
        </div>
      );
    }

    /* ── Root ── */
    function PreorderForm() {
      const WINDOW       = getWindowDates();
      const PICKUP_DATES = WINDOW;
      const last         = WINDOW[WINDOW.length - 1];
      const consecutive  = WINDOW.length > 1 && (last.num - WINDOW[0].num === WINDOW.length - 1);
      const headerSpan   = WINDOW.length === 1
        ? `${WINDOW[0].month}/${WINDOW[0].num}`
        : consecutive
          ? `${WINDOW[0].month}/${WINDOW[0].num}–${last.month}/${last.num}`
          : `${WINDOW[0].month}/${WINDOW[0].num} & ${last.month}/${last.num}`;

      const [open,         setOpen]         = useState(isFormOpen);
      const [step,         setStep]         = useState(1);
      const [confirmed,    setConfirmed]    = useState(false);
      const [qtys,         setQtys]         = useState({});
      const [choices,      setChoices]      = useState({});
      const [details,      setDetails]      = useState({ mode:'pickup' });
      const [slotConflict, setSlotConflict] = useState(false);

      function goTo(n) { if (n === 2) setSlotConflict(false); setStep(n); setTimeout(scrollTop, 60); }

      async function handleSubmit() {
        const orderedItems = ITEMS.filter(it => (qtys[it.id]||0) > 0);
        const subtotal      = orderedItems.reduce((s,it) => s + it.price*(qtys[it.id]||0), 0);
        const ucscDiscount  = details.ucscStudent   ? Math.round(subtotal * 0.10 * 100) / 100 : 0;
        const promoDiscount = details.promoDiscount ? Math.round(subtotal * details.promoDiscount * 100) / 100 : 0;
        const total         = subtotal - ucscDiscount - promoDiscount;

        const itemLineArr = orderedItems.map(it => {
          const ct = choiceText(it, choices, qtys[it.id]||0);
          return `${it.name}${ct ? ` (${ct})` : ''} x${qtys[it.id]} — $${(it.price*qtys[it.id]).toFixed(2)}`;
        });
        if (details.promoFreeMusubi) itemLineArr.push('Spam Musubi (TANIKA promo — free) x1 — $0.00');
        const itemLines = itemLineArr.join('\n');

        // Atomically reserve the time slot in Firestore (prevents double-booking)
        if (db) {
          const selectedSlot = TIME_SLOTS.find(s => s.label === details.time);
          if (selectedSlot) {
            const slotDocId = `${details.date}_${selectedSlot.key}`;
            const slotRef   = db.collection('slots').doc(slotDocId);
            try {
              await db.runTransaction(async t => {
                const doc = await t.get(slotRef);
                if (doc.exists) throw new Error('SLOT_TAKEN');
                t.set(slotRef, {
                  date:         details.date,
                  slotKey:      selectedSlot.key,
                  slotLabel:    details.time,
                  booked:       true,
                  customerName: `${details.firstName} ${details.lastName}`,
                  submittedAt:  firebase.firestore.FieldValue.serverTimestamp(),
                });
              });
            } catch(err) {
              if (err.message === 'SLOT_TAKEN') { setSlotConflict(true); return; }
              console.error('[inoa] slot reservation error:', err);
            }
          }
        }

        const discountParts = [];
        if (ucscDiscount  > 0) discountParts.push(`UCSC student -$${ucscDiscount.toFixed(2)}`);
        if (promoDiscount > 0) discountParts.push(`${(details.promoCode||'').toUpperCase()} promo -$${promoDiscount.toFixed(2)}`);

        const payload = {
          _subject:         `New inoa Pre-Order — ${details.firstName} ${details.lastName}`,
          customer_name:    `${details.firstName} ${details.lastName}`,
          customer_phone:   details.phone,
          customer_email:   details.email,
          ucsc_student:     details.ucscStudent ? 'Yes (10% discount applied)' : 'No',
          promo_code:       details.promoFreeMusubi ? 'TANIKA (free musubi)' : details.promoCode ? details.promoCode.toUpperCase() : 'none',
          fulfillment_type: 'Pickup',
          fulfillment_date: details.date,
          fulfillment_time: details.time,
          pickup_address:   '100 Enterprise Way, Scotts Valley, CA 95066',
          voucher_number:   details.voucher || 'none',
          order_items:      itemLines,
          order_subtotal:   `$${subtotal.toFixed(2)}`,
          order_discount:   discountParts.length > 0 ? discountParts.join(', ') : 'none',
          order_total:      `$${total.toFixed(2)}`,
          notes:            details.notes || '—',
        };

        try {
          const res = await fetch('https://formspree.io/f/mkoqdyzy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (!res.ok) throw new Error('formspree error');
        } catch (err) {
          console.error('[inoa] order submission failed:', err);
        }

        setConfirmed(true);
        scrollTop();
      }

      function handleReset() {
        setQtys({}); setChoices({}); setDetails({ mode:'pickup' }); setStep(1); setConfirmed(false);
        scrollTop();
      }

      if (!open) return (
        <div className="preorder-inner">
          <ClosedView onOpen={() => setOpen(true)} />
        </div>
      );

      if (confirmed) return (
        <div className="preorder-inner">
          <h2 className="preorder-heading">pre-order <span style={{fontSize:'0.55em', opacity:0.6, letterSpacing:'0.01em'}}>{headerSpan}</span></h2>
          <ConfirmView qtys={qtys} details={details} choices={choices} onReset={handleReset} />
        </div>
      );

      return (
        <div className="preorder-inner">
          <h2 className="preorder-heading">pre-order <span style={{fontSize:'0.55em', opacity:0.6, letterSpacing:'0.01em'}}>{headerSpan}</span></h2>
          <StepIndicator step={step} />
          {step===1 && <Step1 qtys={qtys} setQtys={setQtys} choices={choices} setChoices={setChoices} onNext={()=>goTo(2)} />}
          {step===2 && <Step2 details={details} setDetails={setDetails} onNext={()=>goTo(3)} onBack={()=>goTo(1)}
            pickupDates={PICKUP_DATES} slotConflict={slotConflict} onClearSlotConflict={()=>setSlotConflict(false)} />}
          {step===3 && <Step3 qtys={qtys} details={details} choices={choices} onSubmit={handleSubmit} onBack={()=>goTo(2)} slotConflict={slotConflict} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('preorder-root'));
    root.render(<PreorderForm />);
  </script>
</body>
</html>
